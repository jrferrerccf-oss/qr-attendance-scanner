<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>QR Attendance Scanner</title>

  <style>
    body {
      text-align:center;
      font-family: Arial;
      background:#f8f9fa;
    }

    #reader {
      width:90%;
      max-width:400px;
      margin:auto;
    }

    #result {
      font-size:20px;
      font-weight:bold;
      margin-top:15px;
      min-height:30px;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<div id="reader"></div>
<p id="result"></p>

<audio id="beep" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxVoWrmA-0JajEIHfVV6gCkiYWL1xcGNZ5nlylnwad__0sMe2AQsOqUZL1DNLK79bEI/exec";  // 🔴 REPLACE THIS
let scanning = true;
let qr;

// ========================
// Scan Success
// ========================
function onScanSuccess(text) {

  if (!scanning) return;
  scanning = false;

  document.getElementById("beep").play();

  const parts = text.split("|");

  if (parts.length !== 3) {
    document.getElementById("result").innerHTML = "❌ Invalid QR Code";
    restartScan();
    return;
  }

  const scanData = {
    id: parts[0].trim(),
    firstName: parts[1].trim(),
    lastName: parts[2].trim()
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(scanData)
  })
  .then(res => res.text())
  .then(response => {

    const fullName = scanData.firstName + " " + scanData.lastName;
    const timeNow = new Date().toLocaleTimeString();

    if (response === "DUPLICATE") {
      document.getElementById("result").innerHTML =
        "⚠️ <b>" + fullName + "</b> already scanned today";
    } else if (response === "OK") {
      document.getElementById("result").innerHTML =
        "✅ <b>" + fullName + "</b> recorded at " + timeNow;
    } else {
      document.getElementById("result").innerHTML =
        "❌ Server Error";
    }

    restartScan();
  })
.catch(err => {
  console.log("Camera Error:", err);
  document.getElementById("result").innerHTML =
    "❌ Camera Error: " + err;
});
}


// ========================
// Restart Scanner
// ========================
function restartScan() {
  setTimeout(() => {
    scanning = true;
    document.getElementById("result").innerHTML = "";
  }, 1500);
}


// ========================
// Start Scanner (FAST SETTINGS)
// ========================
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: 25,
      qrbox: 0
    },
    onScanSuccess
  )
  .catch(err => {
    document.getElementById("result").innerHTML =
      "Camera Error: " + err;
  });
}

startScanner();

</script>

</body>
</html>
