<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>QR Attendance Scanner</title>

  <style>
    body {
      text-align:center;
      font-family: Arial;
      background:#f8f9fa;
    }

    #reader {
      width:95%;
      max-width:400px;
      margin:auto;
    }

    #result {
      font-size:18px;
      font-weight:bold;
      margin-top:15px;
      min-height:30px;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<div id="reader"></div>
<p id="result"></p>

<audio id="beep" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxVoWrmA-0JajEIHfVV6gCkiYWL1xcGNZ5nlylnwad__0sMe2AQsOqUZL1DNLK79bEI/exec"; 
// 🔴 Replace with your latest deployment URL

let qr;
let isProcessing = false;


// ========================
// Scan Success
// ========================
async function onScanSuccess(decodedText) {

  if (isProcessing) return;
  isProcessing = true;

  document.getElementById("beep").play();

  const parts = decodedText.split("|");

  if (parts.length !== 3) {
    alert("❌ Invalid QR Code");
    restartScanner();
    return;
  }

  const scanData = {
    id: parts[0].trim(),
    firstName: parts[1].trim(),
    lastName: parts[2].trim()
  };

  try {

    await qr.pause(true);

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(scanData)
    });

    const response = await res.text();

    const fullName = scanData.firstName + " " + scanData.lastName;
    const timeNow = new Date().toLocaleTimeString();

    if (response === "DUPLICATE") {

      confirm("⚠️ " + fullName + " already scanned today.");

    } 
    else if (response === "OK") {

      confirm("✅ " + fullName + " recorded successfully at " + timeNow + ".");

    } 
    else {

      confirm("❌ Server Error.");

    }

  } catch (err) {

    confirm("❌ Network Error.");

  }

  restartScanner();
}


// ========================
// Restart Scanner
// ========================
function restartScanner() {

  setTimeout(async () => {
    isProcessing = false;
    await qr.resume();
  }, 1500);
}


// ========================
// Start Scanner
// ========================
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: 30,
      qrbox: { width: 280, height: 280 },
      aspectRatio: 1.0
    },
    onScanSuccess
  )
  .catch(() => {
    alert("❌ Camera blocked. Allow permission in browser.");
  });
}

startScanner();

</script>

</body>
</html>
