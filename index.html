<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>QR Attendance Scanner</title>

  <style>
    body {
      text-align:center;
      font-family: Arial;
      background:#f8f9fa;
    }

    #reader {
      width:95%;
      max-width:400px;
      margin:auto;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<div id="reader"></div>

<audio id="beep" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxVoWrmA-0JajEIHfVV6gCkiYWL1xcGNZ5nlylnwad__0sMe2AQsOqUZL1DNLK79bEI/exec";
// 🔴 Replace with your Google Apps Script deployment URL

let qr;
let isProcessing = false;


// ========================
// REQUEST NOTIFICATION PERMISSION
// ========================
if ("Notification" in window) {
  Notification.requestPermission();
}


// ========================
// SHOW DESKTOP NOTIFICATION (AUTO CLOSE 3s)
// ========================
function showNotification(title, message, iconUrl) {

  if (Notification.permission === "granted") {

    const notification = new Notification(title, {
      body: message,
      icon: iconUrl
    });

    // Auto close after 3 seconds
    setTimeout(() => {
      notification.close();
    }, 3000);
  }
}


// ========================
// Scan Success
// ========================
async function onScanSuccess(decodedText) {

  if (isProcessing) return;
  isProcessing = true;

  document.getElementById("beep").play();

  const parts = decodedText.split("|");

  if (parts.length !== 3) {
    alert("Invalid QR Code");
    restartScanner();
    return;
  }

  const scanData = {
    id: parts[0].trim(),
    firstName: parts[1].trim(),
    lastName: parts[2].trim()
  };

  try {

    await qr.pause(true);

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(scanData)
    });

    const response = await res.text();

    const fullName = scanData.firstName + " " + scanData.lastName;
    const timeNow = new Date().toLocaleTimeString();

    if (response === "OK") {

      showNotification(
        "Attendance Recorded ✅",
        fullName + " at " + timeNow,
        "https://cdn-icons-png.flaticon.com/512/190/190411.png"
      );

    } 
    else if (response === "DUPLICATE") {

      showNotification(
        "Already Scanned ⚠️",
        fullName + " already scanned today.",
        "https://cdn-icons-png.flaticon.com/512/463/463612.png"
      );

    } 
    else {

      showNotification(
        "Server Error ❌",
        "Something went wrong.",
        "https://cdn-icons-png.flaticon.com/512/463/463612.png"
      );

    }

  } catch (err) {

    showNotification(
      "Network Error ❌",
      "Check your internet connection.",
      "https://cdn-icons-png.flaticon.com/512/463/463612.png"
    );

  }

  restartScanner();
}


// ========================
// Restart Scanner
// ========================
function restartScanner() {

  setTimeout(async () => {
    isProcessing = false;
    await qr.resume();
  }, 1500);
}


// ========================
// Start Scanner
// ========================
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: 30,
      qrbox: { width: 280, height: 280 }
    },
    onScanSuccess
  )
  .catch(() => {
    alert("Camera blocked. Allow permission in browser.");
  });
}

startScanner();

</script>

</body>
</html>
