<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>QR Attendance Scanner</title>

  <style>
    body {
      text-align:center;
      font-family: Arial;
      background:#f8f9fa;
    }

    #counter {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    #reader {
      width:95%;
      max-width:400px;
      margin:auto;
    }

    /* Floating toast message */
    #toast {
      visibility: hidden;
      min-width: 200px;
      margin-left: -100px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 12px;
      position: fixed;
      z-index: 999;
      left: 50%;
      bottom: 50px;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.5s, bottom 0.5s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 70px;
    }
  </style>
</head>

<body>

<h3>QR Attendance Scanner</h3>
<div id="counter">Total Attendance Today: 0</div>
<div id="reader"></div>
<div id="toast"></div>

<audio id="beep" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxVoWrmA-0JajEIHfVV6gCkiYWL1xcGNZ5nlylnwad__0sMe2AQsOqUZL1DNLK79bEI/exec";

let qr;
let isProcessing = false;
let totalAttendance = 0;
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// Track today’s date for auto-reset
let todayDate = new Date().toDateString();


// ========================
// SHOW TOAST MESSAGE
// ========================
function showToast(message, color="#333") {
  const toast = document.getElementById("toast");
  toast.innerHTML = message;
  toast.style.backgroundColor = color;
  toast.className = "show";

  setTimeout(() => {
    toast.className = toast.className.replace("show","");
  }, 2000);
}


// ========================
// UPDATE TOTAL ATTENDANCE COUNTER
// ========================
function updateCounter() {
  const counterDiv = document.getElementById("counter");
  counterDiv.innerText = `Total Attendance Today: ${totalAttendance}`;
}


// ========================
// RESET COUNTER IF DAY CHANGED
// ========================
function checkDateReset() {
  const now = new Date();
  const nowStr = now.toDateString();
  if (nowStr !== todayDate) {
    totalAttendance = 0;
    todayDate = nowStr;
    updateCounter();
  }
}


// ========================
// Scan Success
// ========================
async function onScanSuccess(decodedText) {

  // Auto-reset counter if date changed
  checkDateReset();

  if (isProcessing) return;
  isProcessing = true;

  document.getElementById("beep").play();

  const parts = decodedText.split("|");

  if (parts.length !== 3) {
    showToast("❌ Invalid QR", "#e74c3c");
    restartScanner();
    return;
  }

  const scanData = {
    id: parts[0].trim(),
    firstName: parts[1].trim(),
    lastName: parts[2].trim()
  };

  try {
    await qr.pause(true);

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(scanData)
    });

    const response = await res.text();
    const fullName = scanData.firstName + " " + scanData.lastName;

    if (response === "OK") {
      totalAttendance++;
      updateCounter();
      showToast(`✅ ${fullName} recorded`, "#2ecc71");
    } 
    else if (response === "DUPLICATE") {
      showToast(`⚠️ ${fullName} already scanned`, "#f1c40f");
    } 
    else {
      showToast("❌ Server Error", "#e74c3c");
    }

  } catch (err) {
    showToast("❌ Network Error", "#e74c3c");
  }

  restartScanner();
}


// ========================
// Restart Scanner
// ========================
function restartScanner() {
  setTimeout(async () => {
    isProcessing = false;
    await qr.resume();
  }, 1200);
}


// ========================
// Start Scanner
// ========================
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: isMobile ? 10 : 20,
      qrbox: isMobile ? { width: 220, height: 220 } : { width: 280, height: 280 }
    },
    onScanSuccess
  )
  .catch(() => {
    showToast("❌ Camera blocked", "#e74c3c");
  });
}

startScanner();

</script>

</body>
</html>
