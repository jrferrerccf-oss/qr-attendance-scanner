<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>QR Attendance Scanner</title>
  <style>
    table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 5px; }
    th { background-color: #f0f0f0; }
  </style>
</head>
<body style="text-align:center; font-family:Arial;">

<h2>QR Attendance Scanner</h2>
<div id="reader" style="width:90%; max-width:400px; margin:auto;"></div>
<p id="result" style="font-size:18px; margin-top:10px;"></p>

<h3>Today's Attendance</h3>
<table id="attendanceTable" style="margin:auto; width:90%; max-width:400px;">
  <thead>
    <tr>
      <th>Time</th>
      <th>ID</th>
      <th>First Name</th>
      <th>Last Name</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<audio id="beep" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxVoWrmA-0JajEIHfVV6gCkiYWL1xcGNZ5nlylnwad__0sMe2AQsOqUZL1DNLK79bEI/exec";  // 🔥 PASTE YOUR APPS SCRIPT /exec LINK HERE
let scanning = true;
const qr = new Html5Qrcode("reader");

// Render attendance table
function renderAttendance(data) {
  const tbody = document.querySelector("#attendanceTable tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");
    const time = new Date(row.timestamp).toLocaleTimeString();
    tr.innerHTML = `<td>${time}</td>
                    <td>${row.id}</td>
                    <td>${row.firstName}</td>
                    <td>${row.lastName}</td>`;
    tbody.appendChild(tr);
  });
}

// Fetch today's attendance from backend
function updateAttendance() {
  fetch(API_URL + "?action=getToday")
    .then(res => res.json())
    .then(data => renderAttendance(data))
    .catch(err => console.log(err));
}

// QR scan success
function onScanSuccess(text) {
  if (!scanning) return;
  scanning = false;

  document.getElementById("beep").play();

  const parts = text.split("|");
  if (parts.length !== 3) {
    document.getElementById("result").innerText = "❌ Invalid QR";
    scanning = true;
    return;
  }

  const scanData = {
    id: parts[0].trim(),
    firstName: parts[1].trim(),
    lastName: parts[2].trim()
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(scanData)
  })
  .then(res => res.text())
  .then(res => {
    if (res === "DUPLICATE") {
      document.getElementById("result").innerText = "⚠ Already Scanned Today";
    } else {
      document.getElementById("result").innerText = "✅ Attendance Recorded";
    }
    updateAttendance();
    setTimeout(() => scanning = true, 2000);
  })
  .catch(err => {
    document.getElementById("result").innerText = "❌ Error saving";
    scanning = true;
  });
}

// Start scanner
function startScanner() {
  const size = Math.min(window.innerWidth * 0.8, 300);

  Html5Qrcode.getCameras().then(devices => {
    if (devices.length) {
      qr.start(
        devices[0].id,
        { fps: 10, qrbox: size },
        onScanSuccess
      );
    }
  }).catch(err => {
    document.getElementById("result").innerText = "Camera error: " + err;
  });
}

startScanner();
updateAttendance();

</script>
</body>
</html>
